    <title>Q'SHOW | Trilhas Sonoras</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --azul: #007bff; --verde: #32cd32; --roxo: #8a2be2; --dark: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--dark); color: white; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; background: #000; border-bottom: 2px solid #111; text-align: center; }
        .logo-qshow { font-size: 2.8rem; font-weight: 900; background: linear-gradient(to right, var(--azul), var(--verde), var(--roxo)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; text-transform: uppercase; }
        
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        
        /* CARD COM MARCA D'ÁGUA */
        .card-dia { 
            width: 100%; 
            max-width: 400px; 
            height: 500px; 
            border-radius: 35px; 
            position: relative; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
        }

        .watermark {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 6rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05); /* Transparência da marca d'água */
            white-space: nowrap;
            user-select: none;
            z-index: 1;
        }
        
        .card-info { padding: 40px 30px; background: linear-gradient(0deg, rgba(0,0,0,1) 55%, transparent 100%); z-index: 2; text-align: center; }
        .card-info h2 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 800; line-height: 1.1; }
        .card-info p { color: var(--verde); font-size: 1.2rem; margin-bottom: 30px; font-style: italic; }
        
        .btn-play { background: #ff0000; color: white; text-decoration: none; padding: 20px; border-radius: 18px; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; position: relative; z-index: 3; }
        .btn-play:hover { background: #cc0000; transform: scale(1.03); }
        
        .bg-0 { background: linear-gradient(135deg, #001f3f, var(--azul)); }
        .bg-1 { background: linear-gradient(135deg, #002b00, var(--verde)); }
        .bg-2 { background: linear-gradient(135deg, #2d004d, var(--roxo)); }
        
        footer { padding: 20px; text-align: center; color: #555; font-size: 0.8rem; border-top: 1px solid #111; }
    </style>
</head>

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            return Math.floor((now - start) / 86400000);
        }

        function render() {
            const day = getDayOfYear();
            const index = (day - 1) % trilhas.length; 
            const hoje = trilhas[index];
            const corIdx = day % 3;
            const query = encodeURIComponent(hoje.f + " soundtrack " + hoje.m);

            document.getElementById('cardLocal').innerHTML = `
                <div class="card-dia bg-${corIdx}">
                    <div class="watermark">Q'SHOW</div>
                    <div class="card-info">
                        <h2>${hoje.f}</h2>
                        <p><i class="fas fa-compact-disc"></i> ${hoje.m}</p>

                        </a>
