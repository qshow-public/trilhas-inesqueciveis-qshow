            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            return Math.floor((now - start) / 86400000);
        }

        function render() {
            const day = getDayOfYear();
            const index = (day - 1) % trilhas.length; 
            const hoje = trilhas[index];
            const corIdx = day % 3;

            document.getElementById('cardLocal').innerHTML = `
                <div class="card-dia bg-${corIdx}">
                    <div class="watermark">Q'SHOW</div>
                    <div class="card-info">
                        <h2>${hoje.f}</h2>
                        <p><i class="fas fa-compact-disc"></i> ${hoje.m}</p>
                        <a href="${hoje.u}" target="_blank" class="btn-play">
                            <i class="fas fa-external-link-alt"></i> OUVIR NO YOUTUBE
                        </a>
                    </div>
                </div>
            `;
        }
        window.onload = render;
    </script>
</body>
</html>
